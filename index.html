<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>임직원 카드뉴스</title>
<style>
:root{--bg:#eef2f6;--ink:#172033;--accent:#155dcc}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:'Malgun Gothic',Arial,sans-serif;color:var(--ink)}
header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);padding:12px 16px;box-shadow:0 2px 12px #0001;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:18px;margin:0} header small{color:#667085}
.viewer{max-width:760px;margin:0 auto;padding:14px 12px 90px} .stage{position:relative}
.slide{display:none;margin:0} .slide.active{display:block} .slide img{display:block;width:100%;height:auto;border-radius:18px;box-shadow:0 8px 28px #14233b22;background:white}
figcaption{font-size:13px;color:#667085;padding:10px 4px 18px}
.controls{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:10px;align-items:center;background:#fff;padding:9px 12px;border-radius:999px;box-shadow:0 8px 30px #0003;z-index:9}
button{border:0;border-radius:999px;width:44px;height:44px;font-size:22px;background:#edf3ff;color:var(--accent);cursor:pointer} .counter{min-width:62px;text-align:center;font-weight:700}
.empty{background:white;border-radius:18px;padding:60px 20px;text-align:center;color:#667085}
</style></head><body>
<header><h1>임직원 카드뉴스</h1><small>2026-07-14 14:04:36</small></header>
<main class="viewer"><div class="stage"><figure class="slide active" data-index="0"><img src="01_01_%EC%B9%AD%EC%B0%AC%EB%A6%B4%EB%A0%88%EC%9D%B4_groupware_%EC%B9%AD%EC%B0%AC%EB%A6%B4%EB%A0%88%EC%9D%B4_24523.png" alt="칭찬릴레이 80호 - 영상의학과 김태우 매니저"><figcaption><b>칭찬릴레이</b> 칭찬릴레이 80호 - 영상의학과 김태우 매니저</figcaption></figure></div></main>
<div class="controls"><button onclick="move(-1)" aria-label="이전">‹</button><span class="counter"><span id="cur">1</span> / 1</span><button onclick="move(1)" aria-label="다음">›</button></div>
<script>
const slides=[...document.querySelectorAll('.slide')]; let i=0;
function show(n){if(!slides.length)return;i=(n+slides.length)%slides.length;slides.forEach((s,j)=>s.classList.toggle('active',j===i));document.getElementById('cur').textContent=i+1}
function move(d){show(i+d)}
let sx=0;document.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});document.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)move(dx<0?1:-1)},{passive:true});
setInterval(()=>{if(slides.length>1)move(1)},8000);
</script></body></html>
