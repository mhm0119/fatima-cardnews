<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#0f4c81">
  <title>창원파티마병원 임직원 카드뉴스</title>
  <style>
    :root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;color:#132238;background:#eef3f8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .panel{width:min(760px,100%);background:#fff;border-radius:24px;padding:40px 28px;text-align:center;box-shadow:0 18px 50px rgba(28,55,90,.12)}
    h1{margin:0 0 14px;font-size:clamp(26px,5vw,40px);color:#0f4c81}
    p{margin:8px 0;color:#5c6b7a;line-height:1.65}
    .status{margin:26px auto 0;padding:16px 18px;border-radius:14px;background:#eef6ff;color:#174f7a;font-weight:700}
    .note{margin-top:22px;font-size:14px;color:#7a8794}
  </style>
</head>
<body>
  <main class="panel">
    <h1>임직원 카드뉴스</h1>
    <p>게시 준비가 완료되었습니다.</p>
    <p>승인된 카드뉴스가 등록되면 이 화면에서 바로 확인할 수 있습니다.</p>
    <div class="status">GitHub Pages 연결 정상</div>
    <p class="note">외부 공개가 승인된 자료만 게시됩니다.</p>
  </main>
</body>
</html>
